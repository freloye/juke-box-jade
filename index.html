<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juke-box de Jade</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:900px;
  display:flex;
  gap:40px;
  align-items:center;
}

.disc{
  width:320px;
  height:320px;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  background:url("pochette-jade.jpg") center/cover;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.disc video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.disc.playing{
  animation:spin 10s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.controls{
  flex:1;
}

button{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#444;
}

audio{
  width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="disc" id="disc">
    <video id="video" controls playsinline></video>
  </div>

  <div class="controls">

    <h2>Juke-box de Jade</h2>

    <button onclick="playAudio('dans-attente-jade.mp3')">
      Dans l’attente de Jade
    </button>

    <button onclick="playVideo('effet-jade-github.mp4')">
      Effet Jade (film)
    </button>

    <button onclick="playAudio('jade-au-petit-matin.mp3')">
      Jade au petit matin
    </button>

    <audio id="audio" controls></audio>

  </div>

</div>

<script>
const audio = document.getElementById("audio");
const video = document.getElementById("video");
const disc = document.getElementById("disc");

function reset(){
  audio.pause();
  video.pause();
  audio.src="";
  video.src="";
  video.style.display="none";
  disc.classList.remove("playing");
}

function playAudio(src){
  reset();
  audio.src = src;
  audio.play();
  disc.classList.add("playing");
}

function playVideo(src){
  reset();
  video.src = src;
  video.style.display="block";
  video.play().catch(()=>{});
}

audio.addEventListener("play", ()=>disc.classList.add("playing"));
audio.addEventListener("pause", ()=>disc.classList.remove("playing"));

video.addEventListener("play", ()=>disc.classList.remove("playing"));
video.addEventListener("pause", ()=>disc.classList.remove("playing"));
</script>

</body>
</html>
