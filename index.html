<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juke-box de Jade</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:#000;
  min-height:100vh;
}

.bg{
  position:fixed;
  inset:0;
  background:url("pochette-jade.jpg") center/cover no-repeat;
  filter:blur(28px) brightness(.45);
  transform:scale(1.15);
  z-index:-2;
}

.veil{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(255,215,232,.1), rgba(0,0,0,.92));
  z-index:-1;
}

.container{
  max-width:520px;
  margin:auto;
  padding:18px;
  text-align:center;
}

h1{
  margin:10px 0 0;
  color:#ffd7e8;
  font-size:2rem;
}

.subtitle{
  margin:4px 0 18px;
  opacity:.72;
}

.disc{
  width:82vw;
  max-width:330px;
  aspect-ratio:1/1;
  border-radius:50%;
  margin:18px auto 22px;
  overflow:hidden;
  position:relative;
  background:url("pochette-jade.jpg") center/cover no-repeat;
  box-shadow:0 22px 65px rgba(0,0,0,.8);
}

.disc.audio{
  animation:spin 12s linear infinite;
  animation-play-state:paused;
}

.disc.audio.playing{
  animation-play-state:running;
}

.disc video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.disc.video video{
  display:block;
}

.disc::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    repeating-radial-gradient(circle, rgba(255,255,255,.14) 0 1px, rgba(0,0,0,.05) 2px 7px),
    radial-gradient(circle, transparent 58%, rgba(0,0,0,.72));
  pointer-events:none;
}

.disc.video::before{
  animation:spin 7s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.track{
  width:100%;
  padding:15px;
  margin-bottom:11px;
  border:none;
  border-radius:15px;
  background:rgba(255,255,255,.11);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.track:active,
.track.active{
  background:rgba(244,210,122,.36);
}

.video-controls{
  display:none;
  margin-top:12px;
}

.video-controls button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#d7aa4f;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.video-controls input{
  width:100%;
  margin-top:14px;
}

.status{
  margin-top:14px;
  min-height:22px;
  color:rgba(255,255,255,.7);
  font-size:.95rem;
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="veil"></div>

<div class="container">

  <h1>Juke-box de Jade</h1>
  <div class="subtitle">Trois chansons, une même lumière</div>

  <div class="disc audio" id="disc">
    <video id="video" playsinline preload="metadata"></video>
  </div>

  <button class="track" onclick="playAudio(this,'dans-attente-jade.mp3')">
    Dans l’attente de Jade
  </button>

  <button class="track" onclick="playVideo(this,'effet-jade-github.mp4')">
    Effet Jade
  </button>

  <button class="track" onclick="playAudio(this,'jade-au-petit-matin.mp3')">
    Jade au petit matin
  </button>

  <div class="video-controls" id="videoControls">
    <button onclick="toggleVideo()">▶ Lecture / Pause</button>
    <input type="range" id="range" min="0" max="100" value="0">
  </div>

  <div class="status" id="status">Choisis une piste.</div>

</div>

<script>
const disc = document.getElementById("disc");
const video = document.getElementById("video");
const controls = document.getElementById("videoControls");
const range = document.getElementById("range");
const statusText = document.getElementById("status");
const buttons = document.querySelectorAll(".track");

let currentAudio = null;

function setActive(btn){
  buttons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function stopAll(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }

  video.pause();
  video.currentTime = 0;
  video.removeAttribute("src");
  video.load();

  video.style.display = "none";
  controls.style.display = "none";
  range.value = 0;

  disc.classList.remove("audio","video","playing");
}

function playAudio(btn, src){
  stopAll();
  setActive(btn);

  disc.classList.add("audio");
  statusText.textContent = btn.textContent.trim();

  currentAudio = new Audio(src);

  currentAudio.addEventListener("play", () => {
    disc.classList.add("playing");
  });

  currentAudio.addEventListener("pause", () => {
    disc.classList.remove("playing");
  });

  currentAudio.addEventListener("ended", () => {
    disc.classList.remove("playing");
  });

  currentAudio.play().catch(() => {
    statusText.textContent = "Retouche le bouton pour lancer la chanson.";
  });
}

function playVideo(btn, src){
  stopAll();
  setActive(btn);

  disc.classList.add("video");
  video.style.display = "block";
  controls.style.display = "block";

  statusText.textContent = "Effet Jade";
  video.src = src;
  video.muted = false;
  video.load();

  video.play().then(() => {
    disc.classList.add("playing");
  }).catch(() => {
    statusText.textContent = "Appuie sur Lecture / Pause pour lancer le film.";
  });
}

function toggleVideo(){
  if(video.paused){
    video.play().then(() => {
      disc.classList.add("playing");
      statusText.textContent = "Effet Jade";
    });
  }else{
    video.pause();
    disc.classList.remove("playing");
  }
}

video.addEventListener("play", () => disc.classList.add("playing"));
video.addEventListener("pause", () => disc.classList.remove("playing"));
video.addEventListener("ended", () => disc.classList.remove("playing"));

video.addEventListener("timeupdate", () => {
  if(video.duration){
    range.value = (video.currentTime / video.duration) * 100;
  }
});

range.addEventListener("input", () => {
  if(video.duration){
    video.currentTime = (range.value / 100) * video.duration;
  }
});
</script>

</body>
</html>
