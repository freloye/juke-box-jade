<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juke-box de Jade</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:#000;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  inset:0;
  background:url("pochette-jade.jpg") center/cover no-repeat;
  filter:blur(30px) brightness(.45);
  transform:scale(1.15);
  z-index:-2;
}

.veil{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,.08), rgba(0,0,0,.9)),
    linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.95));
  z-index:-1;
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
}

.card{
  width:min(960px,100%);
  background:rgba(10,10,15,.75);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  padding:28px;
  box-shadow:0 30px 90px rgba(0,0,0,.7);
  backdrop-filter:blur(14px);
  text-align:center;
}

h1{
  margin:0 0 8px;
  font-size:clamp(2rem,5vw,4rem);
  color:#ffd7e8;
  letter-spacing:.04em;
  text-shadow:0 0 24px rgba(255,215,232,.35);
}

.subtitle{
  margin:0 0 28px;
  color:rgba(255,255,255,.8);
}

.main{
  display:grid;
  grid-template-columns:1fr 1.1fr;
  gap:30px;
  align-items:center;
}

.disc{
  width:min(360px,78vw);
  aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  background:url("pochette-jade.jpg") center/cover no-repeat;
  box-shadow:
    inset 0 0 0 12px rgba(0,0,0,.28),
    inset 0 0 65px rgba(0,0,0,.55),
    0 25px 70px rgba(0,0,0,.7);
}

.disc.audio{
  animation:spin 12s linear infinite;
  animation-play-state:paused;
}

.disc.audio.playing{
  animation-play-state:running;
}

.disc video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  z-index:1;
  pointer-events:none;
}

.disc.video video{
  display:block;
}

.disc::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    repeating-radial-gradient(circle, rgba(255,255,255,.16) 0 1px, rgba(0,0,0,.06) 2px 7px),
    radial-gradient(circle at center, transparent 0 58%, rgba(0,0,0,.35) 75%, rgba(0,0,0,.75) 100%);
  z-index:2;
  pointer-events:none;
}

.disc.video.playing::before{
  animation:edgeSpin 7s linear infinite;
}

.disc::after{
  content:"";
  position:absolute;
  inset:42%;
  border-radius:50%;
  background:radial-gradient(circle,#111,#000);
  border:3px solid rgba(255,255,255,.25);
  z-index:3;
  pointer-events:none;
}

.disc.video::after{
  display:none;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@keyframes edgeSpin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.player{text-align:left}

.now{
  font-size:1.45rem;
  font-weight:bold;
  margin-bottom:18px;
  color:#f4d27a;
}

.track{
  width:100%;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:white;
  padding:15px 18px;
  border-radius:16px;
  cursor:pointer;
  font-size:1rem;
  text-align:left;
  margin-bottom:12px;
}

.track:hover,
.track.active{
  background:rgba(244,210,122,.22);
  border-color:rgba(244,210,122,.7);
}

audio{
  width:100%;
  margin-top:10px;
}

.video-panel{
  display:none;
  margin-top:10px;
}

.video-panel button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(244,210,122,.25);
  color:white;
  font-size:1rem;
  cursor:pointer;
}

.video-panel button:hover{
  background:rgba(244,210,122,.38);
}

.video-panel input{
  width:100%;
  margin-top:14px;
}

.hint{
  margin-top:14px;
  font-size:.9rem;
  color:rgba(255,255,255,.58);
}

@media(max-width:760px){
  .main{grid-template-columns:1fr}
  .player{text-align:center}
  .track{text-align:center}
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="veil"></div>

<main class="page">
<section class="card">
  <h1>Juke-box de Jade</h1>
  <p class="subtitle">Trois chansons, une même lumière.</p>

  <div class="main">
    <div class="disc audio" id="disc">
      <video id="video" playsinline preload="metadata"></video>
    </div>

    <div class="player">
      <div class="now" id="now">Choisir une chanson</div>

      <button class="track" onclick="playAudio(this,'dans-attente-jade.mp3')">
        Dans l’attente de Jade
      </button>

      <button class="track" onclick="prepareVideo(this,'effet-jade-github.mp4')">
        Effet Jade
      </button>

      <button class="track" onclick="playAudio(this,'jade-au-petit-matin.mp3')">
        Jade au petit matin
      </button>

      <audio id="audio" controls preload="metadata"></audio>

      <div class="video-panel" id="videoPanel">
        <button id="videoPlayBtn" onclick="toggleVideo()">▶ Lancer / Pause le film</button>
        <input id="videoRange" type="range" min="0" max="100" value="0">
      </div>

      <div class="hint">
        Le film s’affiche dans le disque. La commande de lecture est volontairement séparée pour éviter le blocage par l’effet circulaire.
      </div>
    </div>
  </div>
</section>
</main>

<script>
const disc = document.getElementById("disc");
const audio = document.getElementById("audio");
const video = document.getElementById("video");
const now = document.getElementById("now");
const buttons = document.querySelectorAll(".track");
const videoPanel = document.getElementById("videoPanel");
const videoRange = document.getElementById("videoRange");

function activeButton(btn){
  buttons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function reset(){
  audio.pause();
  video.pause();

  audio.removeAttribute("src");
  video.removeAttribute("src");

  audio.load();
  video.load();

  audio.style.display = "block";
  videoPanel.style.display = "none";
  video.style.display = "none";

  disc.classList.remove("playing","audio","video");
  disc.style.backgroundImage = 'url("pochette-jade.jpg")';
}

function playAudio(btn, src){
  reset();
  activeButton(btn);

  now.textContent = btn.textContent.trim();
  disc.classList.add("audio");

  audio.src = src;
  audio.load();

  audio.play().catch(() => {
    now.textContent = "Clique sur lecture pour démarrer";
  });
}

function prepareVideo(btn, src){
  reset();
  activeButton(btn);

  now.textContent = btn.textContent.trim();
  audio.style.display = "none";
  videoPanel.style.display = "block";

  disc.classList.add("video");

  video.src = src;
  video.muted = false;
  video.controls = false;
  video.style.display = "block";
  video.load();
}

function toggleVideo(){
  if(video.paused){
    video.play().then(() => {
      disc.classList.add("playing");
      now.textContent = "Effet Jade";
    }).catch(() => {
      now.textContent = "Lecture bloquée : reclique sur Lancer";
    });
  }else{
    video.pause();
    disc.classList.remove("playing");
  }
}

audio.addEventListener("play", () => disc.classList.add("playing"));
audio.addEventListener("pause", () => disc.classList.remove("playing"));
audio.addEventListener("ended", () => disc.classList.remove("playing"));

video.addEventListener("play", () => disc.classList.add("playing"));
video.addEventListener("pause", () => disc.classList.remove("playing"));
video.addEventListener("ended", () => disc.classList.remove("playing"));

video.addEventListener("timeupdate", () => {
  if(video.duration){
    videoRange.value = (video.currentTime / video.duration) * 100;
  }
});

videoRange.addEventListener("input", () => {
  if(video.duration){
    video.currentTime = (videoRange.value / 100) * video.duration;
  }
});
</script>
</body>
</html>
