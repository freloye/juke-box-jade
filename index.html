<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juke-box de Jade</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:#000;
}

/* fond */
.bg{
  position:fixed; inset:0;
  background:url("pochette-jade.jpg") center/cover no-repeat;
  filter:blur(28px) brightness(.45);
  transform:scale(1.15);
  z-index:-2;
}
.veil{
  position:fixed; inset:0;
  background:radial-gradient(circle, rgba(255,215,232,.1), rgba(0,0,0,.9));
  z-index:-1;
}

/* layout mobile-first */
.container{
  padding:20px;
  max-width:520px;
  margin:auto;
}

h1{
  text-align:center;
  color:#ffd7e8;
  margin:10px 0 0;
}
.subtitle{
  text-align:center;
  opacity:.7;
  margin-bottom:20px;
}

/* disque */
.disc{
  width:80vw;
  max-width:320px;
  aspect-ratio:1;
  border-radius:50%;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  background:url("pochette-jade.jpg") center/cover;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}

.disc.audio{
  animation:spin 12s linear infinite;
  animation-play-state:paused;
}
.disc.audio.playing{
  animation-play-state:running;
}

.disc video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
.disc.video video{
  display:block;
}

/* effet vinyle */
.disc::before{
  content:"";
  position:absolute; inset:0;
  border-radius:50%;
  background:
    repeating-radial-gradient(circle, rgba(255,255,255,.15) 0 1px, rgba(0,0,0,.05) 2px 7px),
    radial-gradient(circle, transparent 60%, rgba(0,0,0,.7));
  pointer-events:none;
}
.disc.video::before{
  animation:spin 7s linear infinite;
}

/* boutons */
.track{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,.08);
  color:white;
  font-size:16px;
}
.track:active{
  background:rgba(244,210,122,.35);
}

/* lecteurs */
audio{
  width:100%;
  margin-top:10px;
}
.video-controls{
  margin-top:10px;
  display:none;
}
.video-controls button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#d4a64f;
  color:white;
  font-size:16px;
}
.video-controls input{
  width:100%;
  margin-top:10px;
}

/* animation */
@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="veil"></div>

<div class="container">

<h1>Juke-box de Jade</h1>
<div class="subtitle">Trois chansons, une même lumière</div>

<div class="disc audio" id="disc">
  <video id="video" playsinline preload="metadata"></video>
</div>

<button class="track" onclick="playAudio('dans-attente-jade.mp3')">
Dans l’attente de Jade
</button>

<button class="track" onclick="playVideo('effet-jade-github.mp4')">
Effet Jade
</button>

<button class="track" onclick="playAudio('jade-au-petit-matin.mp3')">
Jade au petit matin
</button>


<div class="video-controls" id="videoControls">
  <button onclick="toggleVideo()">▶ Lecture / Pause</button>
  <input type="range" id="range" min="0" max="100">
</div>

</div>

<script>
const video=document.getElementById("video");
const disc=document.getElementById("disc");
const controls=document.getElementById("videoControls");
const range=document.getElementById("range");

function reset(){
 video.pause();
video.src="";
  controls.style.display="none";
  video.style.display="none";
  disc.classList.remove("audio","video","playing");
}

let currentAudio = new Audio();

function playAudio(src){
  reset();
  disc.classList.add("audio");

  currentAudio.src = src;
  currentAudio.play().then(()=>{
    disc.classList.add("playing");
  });
}

function playVideo(src){
  reset();
  disc.classList.add("video");
  controls.style.display="block";
  video.style.display="block";
  video.src=src;

  video.muted=false;
  video.play().then(()=>{
    disc.classList.add("playing");
  }).catch(()=>{
    video.muted=true;
    video.play();
  });
}

function toggleVideo(){
  if(video.paused){video.play();}
  else{video.pause();}
}

video.addEventListener("timeupdate",()=>{
  if(video.duration){
    range.value=(video.currentTime/video.duration)*100;
  }
});

range.addEventListener("input",()=>{
  if(video.duration){
    video.currentTime=(range.value/100)*video.duration;
  }
});

audio.addEventListener("play",()=>disc.classList.add("playing"));
audio.addEventListener("pause",()=>disc.classList.remove("playing"));
video.addEventListener("pause",()=>disc.classList.remove("playing"));
video.addEventListener("play",()=>disc.classList.add("playing"));
</script>

</body>
</html>
